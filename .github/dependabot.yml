# Dependabot keeps this repository's dependencies current.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # PHP / Composer dependencies (composer.json).
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "composer"

  # GitHub Actions used by the CI workflows under .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
