name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  static-analysis:
    name: Static analysis (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        drupal: ['^10.3', '^11']
        exclude:
          # Drupal 11 requires PHP 8.3+.
          - php: '8.2'
            drupal: '^11'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: example_starter

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, pdo_mysql, dom, xml, mbstring, intl, curl, opcache, zip
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=-1

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ matrix.php }}-drupal${{ matrix.drupal }}-${{ hashFiles('example_starter/composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-drupal${{ matrix.drupal }}-
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Build Drupal scaffold project
        env:
          DRUPAL_CONSTRAINT: ${{ matrix.drupal }}
        run: |
          composer create-project --no-install --no-interaction \
            "drupal/recommended-project:${DRUPAL_CONSTRAINT}" drupal
          cd drupal
          composer config minimum-stability dev
          composer config prefer-stable true
          composer config repositories.example_starter path ../example_starter
          composer require --no-update "mykolapodpriatov/example_starter:*"
          composer require --dev --no-update \
            drupal/coder:^8.3 \
            mglaman/phpstan-drupal:^1.2 \
            phpstan/phpstan:^1.10 \
            phpstan/phpstan-deprecation-rules:^1.1
          composer update --no-interaction --no-progress --prefer-dist

      - name: Run PHPCS (Drupal coding standards)
        run: |
          cd drupal
          vendor/bin/phpcs --standard=../example_starter/phpcs.xml.dist \
            ../example_starter/src \
            ../example_starter/tests \
            ../example_starter/example_starter.module \
            ../example_starter/example_starter.install

      - name: Run PHPStan (level 8)
        run: |
          cd drupal
          vendor/bin/phpstan analyse \
            --configuration=../example_starter/phpstan.neon \
            --memory-limit=1G \
            --no-progress

  tests:
    name: PHPUnit (PHP ${{ matrix.php }}, Drupal ${{ matrix.drupal }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        drupal: ['^10.3', '^11']
        exclude:
          - php: '8.2'
            drupal: '^11'

    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drupal
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: example_starter

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, pdo_mysql, dom, xml, mbstring, intl, curl, opcache, zip
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=-1

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-tests-${{ runner.os }}-php${{ matrix.php }}-drupal${{ matrix.drupal }}-${{ hashFiles('example_starter/composer.json') }}
          restore-keys: |
            composer-tests-${{ runner.os }}-php${{ matrix.php }}-drupal${{ matrix.drupal }}-

      - name: Build Drupal site for tests
        env:
          DRUPAL_CONSTRAINT: ${{ matrix.drupal }}
        run: |
          composer create-project --no-install --no-interaction \
            "drupal/recommended-project:${DRUPAL_CONSTRAINT}" drupal
          cd drupal
          composer config minimum-stability dev
          composer config prefer-stable true
          composer config repositories.example_starter path ../example_starter
          composer require --no-update "mykolapodpriatov/example_starter:*"
          composer require --dev --no-update phpunit/phpunit:"^9.6 || ^10"
          composer update --no-interaction --no-progress --prefer-dist
          mkdir -p web/sites/simpletest/browser_output

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then
              echo "MariaDB ready" && exit 0
            fi
            sleep 2
          done
          echo "MariaDB did not become ready" && exit 1

      - name: Run unit + kernel tests
        env:
          SIMPLETEST_DB: "mysql://root:root@127.0.0.1:3306/drupal"
          SIMPLETEST_BASE_URL: "http://localhost"
          BROWSERTEST_OUTPUT_DIRECTORY: "/tmp"
          SYMFONY_DEPRECATIONS_HELPER: "weak"
        run: |
          # Run from web/core using core's own PHPUnit config so the core
          # bootstrap and module extension discovery resolve correctly. The
          # module is installed by the path repository into
          # web/modules/contrib/example_starter; target its installed tests
          # via an absolute path.
          module_tests="$GITHUB_WORKSPACE/drupal/web/modules/contrib/example_starter/tests"
          cd drupal/web/core
          ../../vendor/bin/phpunit \
            --configuration phpunit.xml.dist \
            --colors=always \
            "$module_tests/src/Unit" \
            "$module_tests/src/Kernel"
